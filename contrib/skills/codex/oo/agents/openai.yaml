interface:
  display_name: oo
  short_description: Route ready-made cloud and connector tasks through oo
  default_prompt: "Use $oo when I ask to solve OCR, translation, transcription, image generation, subtitle generation, or authenticated connector work through an existing oo capability instead of a local implementation. Read the specific oo reference file before the corresponding command, especially search-and-selection before the first `oo search`. The first search must use one quoted free-form query string plus `--json`, not multiple positional keywords, and alternative searches should not run in parallel before inspecting the first result set. For artifact transfer, use only `oo file upload` or `oo file download`; do not probe or download with `curl`, `wget`, or other ad hoc tools."

policy:
  allow_implicit_invocation: false
