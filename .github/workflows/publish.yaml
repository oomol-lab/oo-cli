name: Publish

on:
  workflow_dispatch:
    inputs:
      expected_version:
        description: Expected version (for example 1.2.3). Leave empty to auto-bump from the latest tag.
        required: false
        type: string
        default: ""
      version_bump:
        description: Version segment to bump when expected_version is empty.
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
        default: patch

permissions:
  id-token: write
  contents: write

concurrency:
  group: publish-${{ github.workflow }}
  cancel-in-progress: false

jobs:
  compute-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.compute.outputs.version }}
      tag_name: ${{ steps.compute.outputs.tag_name }}
      previous_tag: ${{ steps.compute.outputs.previous_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version-file: .bun-version

      - name: Compute Version
        id: compute
        env:
          EXPECTED_VERSION: ${{ inputs.expected_version }}
          VERSION_BUMP: ${{ inputs.version_bump }}
        run: bun run contrib/ci/compute-release-version.ts

  build-platform-packages:
    needs: compute-version
    name: Build ${{ matrix.platform_name }} packages
    runs-on: ${{ matrix.runs_on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform_name: Linux
            runs_on: ubuntu-latest
            artifact_name: release-packages-linux
            build_script: build:linux
          - platform_name: macOS
            runs_on: macos-latest
            artifact_name: release-packages-macos
            build_script: build:macos
          - platform_name: Win32 x64
            runs_on: windows-2025
            artifact_name: release-packages-win32-x64
            build_script: build:windows-x64
          - platform_name: Win32 ARM64
            runs_on: windows-11-arm
            artifact_name: release-packages-win32-arm64
            build_script: build:windows-arm64
    env:
      RELEASE_VERSION: ${{ needs.compute-version.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version-file: .bun-version

      - name: Setup Node.js
        uses: actions/setup-node@v6.3.0
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Install
        run: bun install --frozen-lockfile

      - name: Use workspace Bun cache for Win32 x64 baseline builds
        if: matrix.platform_name == 'Win32 x64'
        run: echo "BUN_INSTALL_CACHE_DIR=${{ github.workspace }}\\.bun-install\\cache" >> $env:GITHUB_ENV

      - name: Stage platform packages
        run: bun run "${{ matrix.build_script }}"

      - name: Upload platform packages
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/release-packages/*
          if-no-files-found: error

  publish:
    needs:
      - compute-version
      - build-platform-packages
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      RELEASE_VERSION: ${{ needs.compute-version.outputs.version }}
      RELEASE_TAG: ${{ needs.compute-version.outputs.tag_name }}
      PREVIOUS_TAG: ${{ needs.compute-version.outputs.previous_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version-file: .bun-version

      - name: Setup Node.js
        uses: actions/setup-node@v6.3.0
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Install
        run: bun install --frozen-lockfile

      - name: Download platform packages
        uses: actions/download-artifact@v4
        with:
          pattern: release-packages-*
          path: dist/release-packages
          merge-multiple: true

      - name: Assemble release artifacts
        run: bun run contrib/ci/release-workflow.ts assemble-release-artifacts

      - name: Publish to npm
        run: |
          while IFS= read -r package_file; do
            npm publish --access public "$package_file"
          done < dist/npm-publish-order.txt

      - name: Create GitHub Release
        run: |
          mapfile -t release_assets < dist/github-release-assets.txt
          bun run contrib/ci/release-workflow.ts create-github-release "${release_assets[@]}"

  upload-release-binaries-to-oss:
    needs:
      - compute-version
      - publish
    permissions:
      contents: read
      id-token: write
    uses: ./.github/workflows/upload-release-binaries-to-oss.yaml
    with:
      version: ${{ needs.compute-version.outputs.version }}
    secrets: inherit

  deploy-install-worker:
    needs:
      - compute-version
      - publish
      - upload-release-binaries-to-oss
    uses: ./.github/workflows/deploy-install-worker.yaml
    with:
      tag: ${{ needs.compute-version.outputs.tag_name }}
    secrets: inherit
